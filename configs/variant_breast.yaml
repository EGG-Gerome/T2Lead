# ===================================================================
# T2Lead — 变异驱动乳腺癌配置（覆盖 default_config.yaml）
# ===================================================================
#
# 使用方法（两种等效方式）：
#
#   方式一：用配置文件
#     python scripts/run_pipeline.py -c configs/variant_breast.yaml -v
#
#   方式二：纯命令行（无需改文件）
#     python scripts/run_pipeline.py \
#       --disease "breast cancer" \
#       --vcf-path /path/to/your.vcf.gz \
#       --auto-stage23 \
#       --stages lead_optimization \
#       -v
#
# 本文件只写需要覆盖默认值的字段；其余继承 default_config.yaml。
# ===================================================================

pipeline:
  stages:
    - lead_optimization

  # AutoDL 大容量挂载盘。
  out_dir: /root/autodl-fs/T2Lead

# disease 字段决定 <out_dir>/<disease_slug>/ 子目录名。
# 也可用命令行覆盖：--disease "lung cancer"
target_discovery:
  disease: "breast cancer"

# -------------------------------------------------------------------
# 变异分析
# -------------------------------------------------------------------
variant_analysis:
  enabled: true

  # ── 方案 A：已有 VEP 注释的 VCF ──
  # 也可用命令行覆盖：--vcf-path /path/to/your.vcf.gz
  vcf_path: ""

  # ── 方案 B：只有原始 FASTQ，交给 Sarek ──
  # 二代测序双端测序：每个样本 2 个文件（R1 正向 + R2 反向）
  # 肿瘤 2 个 + 正常 2 个 = 4 个 FASTQ
  tumor_fastq_r1: ""
  tumor_fastq_r2: ""
  normal_fastq_r1: ""
  normal_fastq_r2: ""

  # 留空 = 不限制，跑 VCF 里所有蛋白质改变突变（"我不知道有什么突变"就留空）
  driver_genes: []

  min_impact: "MODERATE"

  # ── 自动 Stage 2-3（新功能） ──
  # true  = 每个突变基因自动查 ChEMBL 靶点 → 筛选 → 生成先导 → 对接突变结构
  # false = 复用已有的 stage3_leads/final_lead_candidates.csv（快但不够精准）
  # 也可用命令行：--auto-stage23
  auto_stage23: true

  sarek:
    profile: "singularity"

# ===================================================================
# DrugPipe — default pipeline configuration
# ===================================================================
# Override any value via environment variables prefixed with DP_,
# e.g.  DP_TARGET_TO_HIT__CHEMBL__MAX_ACTIVITIES=50000

pipeline:
  stages:
    - target_discovery
    - target_to_hit
    - hit_to_lead
    - lead_optimization
  seed: 42
  out_dir: ./data
  device: auto                       # auto | cuda | mps | cpu (for MLP training + OpenMM MD)
  # When true, artifacts go under <run_root>/stage{1..4}_*/ and <run_root>/logs/
  output_layout:
    use_stage_subdirs: true

# -------------------------------------------------------------------
# Variant Analysis — optional tumor/normal somatic mutation bridge
# -------------------------------------------------------------------
# When a VCF (or FASTQs) is provided, the pipeline extracts protein-
# altering mutations, builds mutant structures, and routes directly
# to Stage 4 for compound screening against the mutant protein.
variant_analysis:
  enabled: false
  vcf_path: ""                       # pre-annotated VEP VCF; skip Sarek if provided
  tumor_fastq_r1: ""                 # paired FASTQ for Sarek; ignored if vcf_path set
  tumor_fastq_r2: ""
  normal_fastq_r1: ""
  normal_fastq_r2: ""
  driver_genes: []                   # restrict to specific genes (empty = all)
  min_impact: "MODERATE"             # VEP IMPACT filter: HIGH, MODERATE, LOW
  auto_stage23: false                # true = auto-run Stage 2-3 per variant gene
                                     # (gene → ChEMBL target → screen → lead gen → dock)
                                     # false = reuse existing stage3_leads/final_lead_candidates.csv
  prefer_experimental_structure: true
  api_timeout_s: 30

  sarek:
    version: "3.8.1"
    genome: "GATK.GRCh38"
    profile: "docker"                # docker | singularity | conda
    max_cpus: 16
    max_memory: "32.GB"
    extra_args: ""

# -------------------------------------------------------------------
# Stage 1 — Target Discovery
# -------------------------------------------------------------------
target_discovery:
  disease: ""                        # e.g. "liver cancer" or EFO_0001378
  top_n_targets: 5

  opentargets:
    enabled: true
    api_url: https://api.platform.opentargets.org/api/v4/graphql
    min_score: 0.1


# -------------------------------------------------------------------
# Stage 2 — Target to Hit  (ChEMBL virtual screening)
# -------------------------------------------------------------------
target_to_hit:
  # Shared ChEMBL molecule + IC50 crawl and Morgan fp_cache across diseases (under pipeline.out_dir).
  # Empty = legacy: crawl and fp_cache live in each run's stage2_hits/.
  shared_library_dir: "shared/chembl_stage2"
  target_chembl_id: ""               # leave empty to auto-select from Stage 1
  external_activities_csv: ""        # path to user-supplied IC50 CSV for novel targets
                                     # must have columns: molecule_chembl_id, target_chembl_id,
                                     # standard_value (IC50 in nM), standard_type, standard_units
  screening_library_csv: ""          # path to user-supplied molecule library (SMILES) for screening
                                     # must have columns: molecule_chembl_id, canonical_smiles
  docking_only: false                # true = skip ML model, use docking scores directly
                                     # useful for novel targets with no IC50 data at all

  chembl:
    base_url: https://www.ebi.ac.uk/chembl/api/data
    page_limit: 1000
    max_molecules: 0                 # 0 = unlimited
    max_activities: 0
    require_nM: true
    polite_sleep: 0.05

  dataset:
    min_train_samples: 200

  featurizer:
    fp_radius: 2
    fp_nbits: 2048

  model:
    rf_n_estimators: 600
    rf_min_samples_leaf: 2
    mlp_epochs: 25
    mlp_batch_size: 256
    mlp_lr: 0.002
    mlp_weight_decay: 0.0001
    test_size: 0.2

  filter:
    pred_pIC50_min: 6.0
    qed_min: 0.6
    top_n: 200
    mw_min: 150
    mw_max: 500
    logp_min: -1.0
    logp_max: 5.0
    tpsa_max: 140
    hbd_max: 5
    hba_max: 10
    rotb_max: 10
    rings_max: 6

# -------------------------------------------------------------------
# Stage 3 — Hit to Lead
# -------------------------------------------------------------------
hit_to_lead:
  max_hits_input: 100                # cap hits entering H2L

  scaffold:
    min_cluster_size: 3

  clustering:
    tanimoto_cutoff: 0.4

  analog_gen:
    enabled: true
    max_analogs_per_hit: 50
    # Default matches scripts/download_crem_db.sh (run from repo root or use make install).
    crem_db_path: data/crem_db/chembl33_sa25_f5.db
    crem_radius: 3
    crem_min_size: 0
    crem_max_size: 10

  mpo:
    w_potency: 0.40
    w_qed: 0.25
    w_admet: 0.20
    w_novelty: 0.15

  reinvent4:
    enabled: true                    # RL-based molecular optimization (needs REINVENT4 + prior)
    # Paths are normally set via .env (DP_HIT_TO_LEAD__REINVENT4__*) by `make install`.
    reinvent_path: ""
    prior_path: ""
    batch_size: 128
    n_steps: 100
    # reinvent CLI: warning = 不刷 INFO，仍显示 WARNING/ERROR；info 排障；error 最简（慎用）
    log_level: warning

  output:
    top_n_leads: 50

# -------------------------------------------------------------------
# Stage 4 — Lead Optimization (docking, enhanced ADMET, MD simulation)
# -------------------------------------------------------------------
lead_optimization:
  enabled: true
  pdb_id: "4JPS"                      # fallback PDB if no target-specific mapping hits
  auto_target_pdb:
    enabled: true
    override_config_pdb: true         # true = mapped target PDB overrides static pdb_id above
    chembl_to_pdb:
      CHEMBL203: "1M17"               # EGFR
      CHEMBL4005: "4JPS"              # PIK3CA / PI3Kalpha
  protein_sequence: ""                 # amino acid sequence; if pdb_id is empty, ESMFold API
                                       # predicts a 3D structure from this sequence automatically
  binding_site:
    center: [0.0, 0.0, 0.0]
    box_size: [25.0, 25.0, 25.0]
    auto_detect: true                # auto-detect from co-crystallized ligand

  docking:
    enabled: true
    exhaustiveness: 32               # 8 = fast screening; 32 = production quality
    n_poses: 3
    n_cpus: 0                        # 0 = auto-detect; Vina uses CPU multi-threading
    score_threshold: -6.0            # kcal/mol; discard scores worse than this

  admet_deep:
    enabled: true
    sa_score_max: 6.0                # synthetic accessibility cutoff (1=easy, 10=hard)
    herg_filter: true
    # Hard gates (rows removed before MD). CYP remains a soft signal via scoring.w_cyp_soft.
    hard_filter:
      enabled: true
      drop_herg: true                # hERG toxicophore match
      drop_veber_fail: true          # Veber oral-bioavailability rules
      drop_high_sa: true             # SA score > sa_score_max

  md_simulation:
    enabled: true
    top_n_for_md: 10                 # only run MD on top-N by docking score
    equilibration_ps: 100
    production_ns: 1.0
    gb_model: "OBC2"                 # OBC1, OBC2, GBn, GBn2
    ligand_restraint_k_kcal_per_a2: 0.0   # implicit-MD ligand positional restraint; 0 disables
    ligand_restraint_heavy_only: true      # restrain heavy atoms only when enabled
    # Ensemble MM-GBSA: multiple short MD runs; mean/std of approximate ΔG snapshots.
    ensemble:
      enabled: true
      n_runs: 5
      equilibration_ps: 100          # per-run equilibration before production
      production_ps: 200               # per-run production length (picoseconds)
      sample_interval_ps: 5            # sample complex potential energy every N ps

  explicit_md:
    enabled: false                   # optional explicit-solvent refinement (TIP3P + PME)
    top_n: 5                         # refine top-N from implicit solvent ranking
    production_ns: 10.0              # 10 ns explicit-solvent production MD
    equilibration_nvt_ps: 100        # NVT equilibration before NPT
    equilibration_npt_ps: 500        # NPT equilibration before production
    padding_nm: 1.0                  # water box padding around solute
    ionic_strength_M: 0.15           # NaCl concentration for charge neutralisation
    trigger:
      delta_opt_score_threshold: 0.05  # if top-N opt_score spread < this, auto-trigger

  scoring:
    # ADMET (hERG / Veber / SA) is enforced via hard_filter; not part of weighted score.
    w_docking: 0.25
    w_md_energy: 0.40                # MM-GBSA-style implicit GB term
    w_stability: 0.35                # trajectory / pose RMSD stability
    w_cyp_soft: 0.08                 # soft penalty for CYP pharmacophore risk (0 = disable)

  md_reliability:
    # If MD is unreliable, keep opt_score visible but rank by fast_score fallback.
    delta_g_max_kcal_per_mol: -1.0   # require MD ΔG <= this threshold
    rmsd_max_angstrom: 15.0          # require md_rmsd_mean <= this threshold
    use_fast_score_fallback: true

  approved_drug_check:
    enabled: true                      # query ChEMBL to flag known approved / clinical-stage drugs
    chembl_base_url: "https://www.ebi.ac.uk/chembl/api/data"

  output:
    top_n_optimized: 10

# -------------------------------------------------------------------
# Benchmark — approved / late-clinical drugs vs same scoring + MD as leads
# -------------------------------------------------------------------
benchmark:
  enabled: true
  max_drugs: 5
  min_phase: 3              # 3 = Phase III+, 4 = approved only
  chembl_base_url: ""        # empty = use target_to_hit.chembl.base_url
  run_docking: true          # benchmark references should be docked when receptor is available
  docking_exhaustiveness: 32 # same quality as Stage-4 for fair comparison
  docking_n_poses: 1
  run_md: true               # run MD for benchmark drugs for apples-to-apples comparison
  md_top_n: 99               # effectively "all" — run MD for every benchmark drug
  md_ensemble_enabled: true
  md_ensemble_n_runs: 1
  md_equilibration_ps: 20
  md_production_ps: 50
  md_sample_interval_ps: 5

# -------------------------------------------------------------------
# Report — auto-generated bilingual dashboard.html after Stage 4
# -------------------------------------------------------------------
report:
  enabled: true
